<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1837 Club Login</title>
    <link rel="stylesheet" href="styles.css?v=social-icon-colours" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel" aria-label="1837 Club member login">
        <img
          class="login-logo"
          src="assets/surrey-1837-club-badge.png"
          alt="The Surrey 1837 Club Light Blues badge"
        />
        <div>
          <p class="brand-line">Members Area</p>
          <h1>1837 Club Login</h1>
        </div>

        <form class="login-form" id="loginForm">
          <label>
            Username
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <p class="login-error" id="loginError" role="alert"></p>
          <button class="login-button" type="submit">Log in</button>
        </form>
      </section>
    </main>

    <script src="login.js?v=login-gate"></script>
  </body>
</html>
