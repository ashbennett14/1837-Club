<!doctype html>
<html lang="en">
  <head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZXL9CHXXT3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZXL9CHXXT3');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1837 Club Login</title>
    <link rel="stylesheet" href="styles.css?v=motion" />
    <script src="analytics.js?v=stats" defer></script>
    <script src="motion.js?v=motion" defer></script>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel" aria-label="1837 Club member login">
        <img
          class="login-logo"
          src="assets/surrey-1837-club-badge.png"
          alt="The Surrey 1837 Club Light Blues badge"
        />
        <div>
          <p class="brand-line">Members Area</p>
          <h1>1837 Club Login</h1>
        </div>

        <form class="login-form" id="loginForm">
          <label>
            Username
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <p class="login-error" id="loginError" role="alert"></p>
          <button class="login-button" type="submit">Log in</button>
        </form>
      </section>
      <footer class="site-footer" aria-label="Site footer">
        <p class="footer-title">The Surrey 1837 Club</p>
        <p>Supporting Surrey Light Blues Across the Province</p>
        <p>© 2026 The Surrey 1837 Club</p>
      </footer>
    </main>

    <script src="login.js?v=login-gate"></script>
  </body>
</html>
